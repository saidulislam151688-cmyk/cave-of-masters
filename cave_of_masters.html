<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cave of Masters</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }
        
        body {
            background: #0a0a14;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        
        #gameCanvas {
            display: block;
            margin: 0 auto;
            background: #0a0a14;
        }
        
        #controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 200px;
            display: flex;
            padding: 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
        }
        
        .control-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .btn {
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 15px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn:active {
            background: rgba(255,255,255,0.4);
            transform: scale(0.95);
        }
        
        .btn-move {
            height: 60px;
            background: rgba(100,150,255,0.2);
        }
        
        .btn-action {
            height: 70px;
            font-size: 18px;
        }
        
        .btn-attack { background: rgba(239,68,68,0.3); border-color: #ef4444; }
        .btn-dodge { background: rgba(147,51,234,0.3); border-color: #9333ea; }
        .btn-block { background: rgba(59,130,246,0.3); border-color: #3b82f6; }
        
        #menu {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, #0a0a14 0%, #1a1a2e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        #menu h1 {
            font-size: 48px;
            color: #f59e0b;
            text-shadow: 0 0 20px rgba(245,158,11,0.5);
            margin-bottom: 10px;
        }
        
        #menu h2 {
            font-size: 20px;
            color: #6b7280;
            margin-bottom: 40px;
        }
        
        #startBtn {
            padding: 20px 60px;
            font-size: 24px;
            background: linear-gradient(135deg, #9333ea, #6366f1);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(147,51,234,0.4);
        }
        
        #startBtn:active {
            transform: scale(0.95);
        }
        
        .controls-info {
            margin-top: 40px;
            color: #6b7280;
            font-size: 14px;
            text-align: center;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div id="menu">
        <h1>CAVE OF MASTERS</h1>
        <h2>The Path to Inner Legend</h2>
        <button id="startBtn">START GAME</button>
        <div class="controls-info">
            <p>Desktop: WASD/Arrows to move, J=Attack, K=Heavy, S=Dodge, Ctrl=Block</p>
            <p>Mobile: Use on-screen buttons</p>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="controls">
        <div class="control-group">
            <button class="btn btn-move" id="btnLeft">◀</button>
            <button class="btn btn-move" id="btnRight">▶</button>
            <button class="btn btn-move" id="btnJump">▲</button>
        </div>
        <div class="control-group" style="flex: 2; flex-direction: row; flex-wrap: wrap; gap: 10px; align-content: flex-end; justify-content: flex-end;">
            <button class="btn btn-action btn-attack" id="btnAttack" style="flex: 1;">ATTACK</button>
            <button class="btn btn-action btn-dodge" id="btnDodge" style="flex: 1;">DODGE</button>
            <button class="btn btn-action btn-block" id="btnBlock" style="flex: 1;">BLOCK</button>
        </div>
    </div>

    <script>
        // ==================== GAME ENGINE ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Set canvas size
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight - 200;
        }
        resize();
        window.addEventListener('resize', resize);
        
        // Colors
        const COLORS = {
            bg: '#0a0a14',
            bgLight: '#1a1a2e',
            player: '#4da6ff',
            playerDark: '#2d7acc',
            enemy: '#ff6b6b',
            enemyDark: '#cc4444',
            health: '#ef4444',
            healthDark: '#991b1b',
            stamina: '#22c55e',
            focus: '#3b82f6',
            gold: '#f59e0b',
            white: '#ffffff',
            purple: '#9333ea'
        };
        
        // Game state
        let gameState = 'MENU';
        let player = null;
        let enemies = [];
        let particles = [];
        let groundY;
        let room = 0;
        let caveLevel = 1;
        let screenShake = 0;
        
        // Input state
        const keys = {};
        
        // ==================== CLASSES ====================
        class Player {
            constructor() {
                this.x = canvas.width / 2;
                this.y = groundY - 120;
                this.width = 50;
                this.height = 100;
                this.vx = 0;
                this.vy = 0;
                this.onGround = false;
                this.facingRight = true;
                
                this.maxHealth = 100;
                this.health = 100;
                this.maxStamina = 50;
                this.stamina = 50;
                this.maxFocus = 30;
                this.focus = 30;
                
                this.level = 1;
                this.xp = 0;
                this.xpNext = 100;
                
                this.state = 'idle';
                this.attacking = false;
                this.attackTimer = 0;
                this.combo = 0;
                this.blocking = false;
                this.dodgeTimer = 0;
                this.invincible = false;
                this.invincibleTimer = 0;
            }
            
            update() {
                // Physics
                this.vy += 0.7;
                this.y += this.vy;
                this.x += this.vx;
                
                // Ground collision
                if (this.y >= groundY - this.height) {
                    this.y = groundY - this.height;
                    this.vy = 0;
                    this.onGround = true;
                } else {
                    this.onGround = false;
                }
                
                // Friction
                this.vx *= 0.9;
                
                // Bounds
                this.x = Math.max(30, Math.min(canvas.width - 30, this.x));
                
                // Timers
                if (this.attackTimer > 0) {
                    this.attackTimer--;
                    if (this.attackTimer <= 0) {
                        this.attacking = false;
                    }
                }
                
                if (this.dodgeTimer > 0) {
                    this.dodgeTimer--;
                    if (this.dodgeTimer <= 15) {
                        this.invincible = false;
                    }
                }
                
                if (this.invincibleTimer > 0) {
                    this.invincibleTimer--;
                    if (this.invincibleTimer <= 0) {
                        this.invincible = false;
                    }
                }
                
                // Regen
                this.stamina = Math.min(this.maxStamina, this.stamina + 0.2);
                this.focus = Math.min(this.maxFocus, this.focus + 0.05);
                
                // State
                if (this.attacking) {
                    this.state = 'attack';
                } else if (!this.onGround) {
                    this.state = 'jump';
                } else if (Math.abs(this.vx) > 1) {
                    this.state = 'run';
                } else {
                    this.state = 'idle';
                }
            }
            
            attack() {
                if (this.attacking || this.stamina < 5) return;
                
                this.attacking = true;
                this.attackTimer = 20;
                this.stamina -= 5;
                this.combo++;
                
                // Check hits
                const attackX = this.x + (this.facingRight ? 60 : -60);
                
                enemies.forEach(enemy => {
                    if (enemy.health <= 0) return;
                    const dist = Math.abs(enemy.x - attackX);
                    if (dist < 60) {
                        const damage = 10 + this.combo * 2;
                        enemy.takeDamage(damage, this.facingRight ? 10 : -10);
                        
                        // Particles
                        for (let i = 0; i < 8; i++) {
                            particles.push(new Particle(enemy.x, enemy.y + 30, COLORS.gold));
                        }
                    }
                });
            }
            
            dodge() {
                if (this.dodgeTimer > 0 || this.stamina < 15) return;
                
                this.stamina -= 15;
                this.dodgeTimer = 30;
                this.invincible = true;
                this.vx = (this.facingRight ? 1 : -1) * 20;
            }
            
            jump() {
                if (!this.onGround || this.stamina < 5) return;
                this.stamina -= 5;
                this.vy = -20;
                this.onGround = false;
            }
            
            draw() {
                const shakeX = screenShake * (Math.random() - 0.5);
                const shakeY = screenShake * (Math.random() - 0.5);
                
                ctx.save();
                ctx.translate(this.x + shakeX, this.y + shakeY);
                
                if (!this.facingRight) {
                    ctx.scale(-1, 1);
                }
                
                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(0, this.height, 30, 10, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Body
                ctx.fillStyle = this.invincible ? '#aaaaff' : COLORS.player;
                ctx.fillRect(-this.width/2, 0, this.width, this.height);
                
                // Highlight
                ctx.fillStyle = this.invincible ? '#ccccff' : COLORS.playerDark;
                ctx.fillRect(-this.width/2, 0, this.width, this.height/3);
                
                // Eyes
                ctx.fillStyle = 'white';
                ctx.fillRect(5, 20, 10, 10);
                ctx.fillStyle = 'black';
                ctx.fillRect(8, 23, 4, 4);
                
                // Attack effect
                if (this.attacking && this.attackTimer > 10) {
                    ctx.fillStyle = COLORS.gold;
                    ctx.beginPath();
                    ctx.arc(40, 40, 20, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Block shield
                if (this.blocking) {
                    ctx.strokeStyle = COLORS.focus;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(0, this.height/2, this.width + 20, 0, Math.PI * 2);
                    ctx.stroke();
                }
                
                ctx.restore();
                
                // Health bar
                this.drawBar(this.x - 40, this.y - 20, 80, 8, this.health, this.maxHealth, COLORS.health);
                this.drawBar(this.x - 40, this.y - 8, 80, 5, this.stamina, this.maxStamina, COLORS.stamina);
                this.drawBar(this.x - 40, this.y, 80, 3, this.focus, this.maxFocus, COLORS.focus);
                
                // Combo
                if (this.combo > 1) {
                    ctx.fillStyle = COLORS.gold;
                    ctx.font = 'bold 24px Arial';
                    ctx.fillText(this.combo + ' HIT!', this.x + 30, this.y - 30);
                }
            }
            
            drawBar(x, y, w, h, current, max, color) {
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(x, y, w, h);
                ctx.fillStyle = color;
                ctx.fillRect(x, y, w * (current / max), h);
                ctx.strokeStyle = '#333';
                ctx.strokeRect(x, y, w, h);
            }
        }
        
        class Enemy {
            constructor(x, type, level) {
                this.x = x;
                this.y = groundY - 100;
                this.width = 50;
                this.height = 100;
                this.type = type;
                
                const stats = {
                    minion: { health: 30, damage: 5, speed: 2 },
                    soldier: { health: 50, damage: 10, speed: 3 },
                    elite: { health: 80, damage: 15, speed: 4 }
                };
                
                const s = stats[type] || stats.soldier;
                this.maxHealth = s.health + level * 10;
                this.health = this.maxHealth;
                this.damage = s.damage + level * 2;
                this.speed = s.speed + level * 0.5;
                
                this.vx = 0;
                this.onGround = true;
                this.facingRight = false;
                this.attackCooldown = 0;
            }
            
            update() {
                if (this.health <= 0) return;
                
                // AI
                const dx = player.x - this.x;
                const dist = Math.abs(dx);
                
                this.facingRight = dx > 0;
                
                if (dist > 200) {
                    this.vx = this.speed * (dx > 0 ? 1 : -1);
                } else if (dist > 60 && this.attackCooldown <= 0) {
                    this.vx = 0;
                }
                
                this.x += this.vx;
                this.x = Math.max(30, Math.min(canvas.width - 30, this.x));
                
                if (this.attackCooldown > 0) this.attackCooldown--;
                
                // Attack
                if (this.attackCooldown === 30 && dist < 70) {
                    if (!player.blocking && !player.invincible) {
                        player.health -= this.damage;
                        screenShake = 5;
                    } else if (player.blocking) {
                        player.health -= Math.floor(this.damage * 0.3);
                    }
                }
            }
            
            takeDamage(damage, knockback) {
                this.health -= damage;
                this.vx = knockback;
                
                if (this.health <= 0) {
                    player.xp += 20 + this.type.length * 5;
                }
            }
            
            draw() {
                if (this.health <= 0) return;
                
                ctx.save();
                ctx.translate(this.x, this.y);
                
                if (!this.facingRight) {
                    ctx.scale(-1, 1);
                }
                
                // Body
                ctx.fillStyle = this.type === 'elite' ? '#ff4444' : COLORS.enemy;
                ctx.fillRect(-this.width/2, 0, this.width, this.height);
                
                // Darker shade
                ctx.fillStyle = this.type === 'elite' ? '#cc2222' : COLORS.enemyDark;
                ctx.fillRect(-this.width/2, 0, this.width, this.height/3);
                
                // Eyes
                ctx.fillStyle = 'white';
                ctx.fillRect(5, 20, 10, 10);
                ctx.fillStyle = 'black';
                ctx.fillRect(8, 23, 4, 4);
                
                ctx.restore();
                
                // Health bar
                const barWidth = 60;
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(this.x - barWidth/2, this.y - 15, barWidth, 6);
                ctx.fillStyle = COLORS.enemy;
                ctx.fillRect(this.x - barWidth/2, this.y - 15, barWidth * (this.health / this.maxHealth), 6);
            }
        }
        
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 30;
                this.color = color;
                this.size = Math.random() * 8 + 4;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.3;
                this.life--;
            }
            
            draw() {
                ctx.globalAlpha = this.life / 30;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * (this.life / 30), 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        
        // ==================== GAME FUNCTIONS ====================
        function initGame() {
            groundY = canvas.height - 50;
            player = new Player();
            enemies = [];
            particles = [];
            room = 0;
            caveLevel = 1;
            spawnEnemies();
        }
        
        function spawnEnemies() {
            enemies = [];
            const count = 2 + room;
            const types = ['minion', 'soldier'];
            if (caveLevel >= 3) types.push('elite');
            
            for (let i = 0; i < count; i++) {
                const type = types[Math.floor(Math.random() * types.length)];
                const x = 100 + Math.random() * (canvas.width - 200);
                enemies.push(new Enemy(x, type, caveLevel));
            }
        }
        
        function update() {
            if (gameState !== 'PLAYING') return;
            
            // Input
            if (keys['ArrowLeft'] || keys['KeyA']) {
                player.vx = -6;
                player.facingRight = false;
            }
            if (keys['ArrowRight'] || keys['KeyD']) {
                player.vx = 6;
                player.facingRight = true;
            }
            if ((keys['ArrowUp'] || keys['KeyW'] || keys['Space']) && player.onGround) {
                player.jump();
            }
            
            player.update();
            
            // Enemies
            enemies.forEach(e => e.update());
            
            // Particles
            particles = particles.filter(p => {
                p.update();
                return p.life > 0;
            });
            
            // Check room complete
            const alive = enemies.filter(e => e.health > 0).length;
            if (alive === 0) {
                room++;
                if (room >= 5) {
                    victory();
                } else {
                    spawnEnemies();
                }
            }
            
            // Check death
            if (player.health <= 0) {
                gameOver();
            }
            
            // Level up
            if (player.xp >= player.xpNext) {
                player.level++;
                player.xp -= player.xpNext;
                player.xpNext = Math.floor(player.xpNext * 1.5);
                player.maxHealth += 10;
                player.health = player.maxHealth;
                player.maxStamina += 3;
                player.stamina = player.maxStamina;
            }
            
            // Screen shake decay
            if (screenShake > 0) screenShake *= 0.9;
        }
        
        function draw() {
            // Background
            ctx.fillStyle = COLORS.bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0f0f1a');
            gradient.addColorStop(1, '#1a1a2e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (gameState !== 'PLAYING') return;
            
            // Ground
            ctx.fillStyle = '#1a1515';
            ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
            
            // Entities
            enemies.forEach(e => e.draw());
            player.draw();
            particles.forEach(p => p.draw());
            
            // UI
            ctx.fillStyle = COLORS.gold;
            ctx.font = 'bold 28px Arial';
            ctx.fillText('LV.' + player.level, 20, 40);
            
            ctx.fillStyle = '#888';
            ctx.font = '20px Arial';
            ctx.fillText('Room ' + (room + 1) + '/5', canvas.width - 120, 40);
            
            ctx.fillStyle = '#888';
            ctx.font = '18px Arial';
            ctx.fillText('XP: ' + player.xp + '/' + player.xpNext, 20, 65);
        }
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        function victory() {
            gameState = 'VICTORY';
            caveLevel++;
            if (caveLevel > 5) caveLevel = 5;
            
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = COLORS.gold;
            ctx.font = 'bold 48px Arial';
            ctx.fillText('VICTORY!', canvas.width/2 - 100, canvas.height/2 - 20);
        }
        
        function gameOver() {
            gameState = 'GAMEOVER';
            
            ctx.fillStyle = 'rgba(80,0,0,0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = COLORS.health;
            ctx.font = 'bold 48px Arial';
            ctx.fillText('DEFEATED', canvas.width/2 - 120, canvas.height/2 - 20);
        }
        
        // ==================== INPUT ====================
        document.addEventListener('keydown', e => {
            keys[e.code] = true;
            
            if (gameState === 'MENU' && e.code === 'Enter') {
                startGame();
            }
            
            if (gameState === 'PLAYING') {
                if (e.code === 'KeyJ') player.attack();
                if (e.code === 'KeyK') player.attack();
                if (e.code === 'KeyS') player.dodge();
                if (e.code === 'ControlLeft' || e.code === 'ControlRight') player.blocking = true;
            }
            
            if ((gameState === 'VICTORY' || gameState === 'GAMEOVER') && e.code === 'Enter') {
                startGame();
            }
        });
        
        document.addEventListener('keyup', e => {
            keys[e.code] = false;
            if (e.code === 'ControlLeft' || e.code === 'ControlRight') player.blocking = false;
        });
        
        // Touch controls
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');
        const btnJump = document.getElementById('btnJump');
        const btnAttack = document.getElementById('btnAttack');
        const btnDodge = document.getElementById('btnDodge');
        const btnBlock = document.getElementById('btnBlock');
        
        function addTouch(el, action) {
            el.addEventListener('touchstart', e => { e.preventDefault(); action(); });
            el.addEventListener('mousedown', e => { e.preventDefault(); action(); });
        }
        
        addTouch(btnLeft, () => { keys['ArrowLeft'] = true; });
        addTouch(btnRight, () => { keys['ArrowRight'] = true; });
        addTouch(btnJump, () => player.jump());
        addTouch(btnAttack, () => player.attack());
        addTouch(btnDodge, () => player.dodge());
        
        btnBlock.addEventListener('touchstart', e => { e.preventDefault(); player.blocking = true; });
        btnBlock.addEventListener('touchend', e => { e.preventDefault(); player.blocking = false; });
        
        document.getElementById('btnLeft').addEventListener('touchend', () => keys['ArrowLeft'] = false);
        document.getElementById('btnRight').addEventListener('touchend', () => keys['ArrowRight'] = false);
        
        // Start button
        document.getElementById('startBtn').addEventListener('click', startGame);
        
        function startGame() {
            document.getElementById('menu').style.display = 'none';
            gameState = 'PLAYING';
            initGame();
        }
        
        // Start loop
        gameLoop();
    </script>
</body>
</html>
